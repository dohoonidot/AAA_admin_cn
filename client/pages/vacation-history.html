<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>부여내역 - AAA 관리자 홈</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/custom-select.css">
    <link rel="stylesheet" href="../css/vacation-admin.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h1>AAA 관리자 홈</h1>
            <div class="sidebar-tabs">
                <a href="../index.html" class="sidebar-tab">홈</a>
                <a href="dashboard.html" class="sidebar-tab">대시보드</a>
                <div class="sidebar-tab-dropdown">
                    <div class="sidebar-tab sidebar-tab-with-dropdown">
                        사용자 관리
                        <span class="dropdown-arrow">▼</span>
                    </div>
                    <div class="sidebar-dropdown-content">
                        <a href="users.html" class="sidebar-dropdown-item">재직자</a>
                        <a href="resigned-users.html" class="sidebar-dropdown-item">퇴사자</a>
                    </div>
                </div>
                <a href="gifts.html" class="sidebar-tab">선물보내기</a>
                <div class="sidebar-tab-dropdown">
                    <div class="sidebar-tab sidebar-tab-with-dropdown active">
                        휴가 총괄 관리
                        <span class="dropdown-arrow">▼</span>
                    </div>
                    <div class="sidebar-dropdown-content">
                        <a href="vacation-requests.html" class="sidebar-dropdown-item">부여요청목록</a>
                        <a href="vacation-history.html" class="sidebar-dropdown-item active">부여내역</a>
                        <a href="vacation-status.html" class="sidebar-dropdown-item">전사원 휴가현황</a>
                        <a href="vacation-proxy.html" class="sidebar-dropdown-item" style="display: none;">휴가 대리결제</a>
                        <a href="vacation-manual.html" class="sidebar-dropdown-item">임의휴가부여</a>
                        <a href="vacation-approvers.html" class="sidebar-dropdown-item">권한관리자 지정</a>
                        <a href="vacation-promotion.html" class="sidebar-dropdown-item" style="display: none;">연차촉진관리</a>
                        <a href="vacation-calendar.html" class="sidebar-dropdown-item">휴가 캘린더</a>
                        <a href="vacation-approval-history.html" class="sidebar-dropdown-item">휴가신청승인 관리</a>
                    </div>
                </div>
            </div>
            <div class="user-info">
                <span id="username-display"></span>
                <button id="logout-btn" class="logout-btn">로그아웃</button>
            </div>
        </div>

        <div class="main-content">
            <div class="page-header">
                <div class="header-content">
                    <div class="title-section">
                        <h1>부여내역</h1>
                        <p class="subtitle">처리 완료된 휴가 부여 내역을 확인할 수 있습니다</p>
                    </div>
                    <button id="export-history-btn" class="refresh-btn" style="margin-left: auto;">엑셀</button>
                </div>
            </div>

            <div id="history-tab" class="tab-content active">
                <div class="history-table-container">
                    <table class="history-table">
                        <thead>
                            <tr>
                                <th>신청자</th>
                                <th>부서</th>
                                <th>휴가 유형</th>
                                <th>리셋기간</th>
                                <th>일수</th>
                                <th>신청일</th>
                                <th>처리일</th>
                                <th>상태</th>
                            </tr>
                        </thead>
                        <tbody id="history-table-body">
                            <!-- API 데이터로 동적 생성 -->
                        </tbody>
                    </table>
                </div>

                <!-- 페이지네이션 -->
                <div class="pagination-container" id="history-pagination" style="display: none;">
                    <button id="first-page-btn" class="pagination-btn" onclick="goToFirstHistoryPage()">« 처음</button>
                    <button id="prev-page-btn" class="pagination-btn" onclick="changeHistoryPage(-1)">‹ 이전</button>
                    
                    <!-- 페이지 번호 버튼들 -->
                    <div id="history-page-numbers" style="display: flex; gap: 4px; align-items: center;"></div>
                    
                    <button id="next-page-btn" class="pagination-btn" onclick="changeHistoryPage(1)">다음 ›</button>
                    <button id="last-page-btn" class="pagination-btn" onclick="goToLastHistoryPage()">마지막 »</button>
                    
                    <!-- 페이지 정보 -->
                    <span id="page-info" class="page-info">1 / 1</span>
                </div>
            </div>
        </div>
    </div>

    <!-- 부여내역 상세 모달 -->
    <div id="history-detail-modal" class="modal" style="display: none;" onclick="if(event.target === this) closeHistoryDetailModal();">
        <div class="modal-content history-detail-modal-content" onclick="event.stopPropagation();">
            <div class="history-detail-header">
                <h2 class="history-detail-title">휴가 부여 내역 상세</h2>
                <button class="history-detail-close-x" onclick="closeHistoryDetailModal()" aria-label="닫기">&times;</button>
            </div>

            <div class="history-detail-body">
                <div class="history-detail-fields">
                <!-- 신청자 정보 -->
                <div class="info-row">
                    <div class="label">신청자</div>
                    <div class="value" id="modal-applicant">-</div>
                </div>

                <!-- 부서 -->
                <div class="info-row">
                    <div class="label">부서</div>
                    <div class="value" id="modal-department">-</div>
                </div>

                <!-- 휴가 유형 -->
                <div class="info-row">
                    <div class="label">휴가 유형</div>
                    <div class="value" id="modal-leave-type">-</div>
                </div>

                <!-- 리셋기간 -->
                <div class="info-row">
                    <div class="label">리셋기간</div>
                    <div class="value" id="modal-reset-date">-</div>
                </div>

                <!-- 부여 일수 -->
                <div class="info-row">
                    <div class="label">부여 일수</div>
                    <div class="value" id="modal-grant-days">-</div>
                </div>

                <!-- 신청일 -->
                <div class="info-row">
                    <div class="label">신청일</div>
                    <div class="value" id="modal-approval-date">-</div>
                </div>

                <!-- 처리일 -->
                <div class="info-row">
                    <div class="label">처리일</div>
                    <div class="value" id="modal-proc-date">-</div>
                </div>

                <!-- 상태 -->
                <div class="info-row">
                    <div class="label">상태</div>
                    <div class="value" id="modal-status">-</div>
                </div>

                <!-- 메모 -->
                <div class="info-row full">
                    <div class="label">메모</div>
                    <div class="value memo-box" id="modal-memo">로딩 중...</div>
                </div>

                <!-- 첨부파일 -->
                <div class="info-row full">
                    <div class="label">첨부파일</div>
                    <div id="modal-attachments"></div>
                </div>
                </div>
            </div>

            <!-- 모달 하단 버튼 -->
            <div class="history-detail-footer">
                <button class="history-detail-close-btn" onclick="closeHistoryDetailModal()">
                    닫기
                </button>
            </div>
        </div>
    </div>

    <!-- 첨부파일 보기 모달 -->
    <div id="attachment-modal" class="modal">
        <div class="modal-content large">
            <div class="modal-header">
                <h3 id="attachment-title">첨부파일</h3>
                <button class="close-btn" onclick="closeAttachmentModal()">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <div id="attachment-content">
                    <p>첨부파일을 불러오는 중...</p>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/utils/config.js"></script>
    <script src="../js/utils/custom-select.js"></script>
    <script src="../js/main.js"></script>
    <script src="../js/utils/auth.js"></script>
    <script src="../js/vacation-admin.js"></script>
    <script>
        // 페이지 로드 시 권한별 메뉴 제어 및 부여내역 데이터 로드
        document.addEventListener('DOMContentLoaded', function() {
            controlSidebarMenus();
            // 부여내역 탭 데이터 자동 로드
            setTimeout(() => {
                if (typeof loadGrantHistory === 'function') {
                    loadGrantHistory(1);
                }
            }, 500);

            document.getElementById('export-history-btn').addEventListener('click', function() {
                if (typeof allHistoryGrants === 'undefined' || !allHistoryGrants || allHistoryGrants.length === 0) {
                    alert('내보낼 데이터가 없습니다.');
                    return;
                }

                const rows = [['신청자', '부서', '휴가 유형', '리셋기간', '일수', '신청일', '처리일', '상태']];
                allHistoryGrants.forEach(g => {
                    const name = g.job_position ? `${g.name || '-'} ${g.job_position}` : (g.name || '-');
                    const statusMap = { 'APPROVED': '부여 완료', 'REJECTED': '반려', 'PENDING': '대기중', 'REQUESTED': '요청됨' };
                    rows.push([
                        name,
                        g.department || '-',
                        g.leave_type || '-',
                        g.leave_reset_date || '-',
                        g.grant_days || 0,
                        g.approval_date || '-',
                        g.proc_date || g.approval_date || '-',
                        statusMap[g.status?.toUpperCase()] || g.status || '-'
                    ]);
                });

                const csvContent = rows.map(row => row.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(',')).join('\n');
                const blob = new Blob(['\uFEFF' + csvContent], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = `부여내역.csv`;
                link.click();
                URL.revokeObjectURL(link.href);
            });
        });
    </script>
</body>
</html>
